<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links Hive Energy</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #7f60fd 0%, #111827 45%, #050505 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .logo {
      width: 180px;
      max-width: 70%;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: 28px;
      margin: 0 0 10px;
    }

    p {
      color: #d1d5db;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 26px;
    }

    .botao {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 14px 0;
      padding: 17px 18px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .botao:hover {
      transform: translateY(-2px);
    }

    .principal {
      background: #7f60fd;
    }

    .principal:hover {
      background: #6246d8;
    }

    .simulacao {
      background: #10b981;
    }

    .simulacao:hover {
      background: #059669;
    }

    .whatsapp {
      background: #22c55e;
    }

    .whatsapp:hover {
      background: #16a34a;
    }

    .rodape {
      margin-top: 22px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="card">
      <img class="logo" src="https://licenciadohiveenergy.com.br/logo.png" alt="Hive Energy">

      <h1>Hive Energy</h1>

      <p>
        Economize na conta de energia sem instalar placas solares.
        Escolha uma opção abaixo.
      </p>

      <a class="botao principal" href="https://licenciadohiveenergy.com.br/">
        Entender como funciona
      </a>

      <a class="botao simulacao" href="https://contaenergia.hiveglobal.com.br/?planId=de9ef5b8d2eeaae8&sellerId=israelnpereira">
        Fazer simulação gratuita
      </a>

      <a class="botao whatsapp" href="https://wa.me/5531997522104">
        Falar no WhatsApp
      </a>

      <div class="rodape">
        Energia compartilhada • Sem obras • Sem instalação
      </div>
    </div>
  </main>
</body>
</html>
